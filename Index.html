<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTraders Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* GENERAL STYLES */
body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    background: #f4f6f9;
}
header {
    background: linear-gradient(90deg,#0b1f3a,#1e3d6b);
    color: white;
    text-align: center;
    padding: 25px 20px;
}
header h1 {
    margin: 0;
    font-size: 32px;
    letter-spacing: 2px;
}
header p {
    margin: 5px 0 0 0;
    font-size: 16px;
    color: #ddd;
}
.container {
    width: 90%;
    margin: 20px auto;
}
.stats {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: space-between;
    margin-bottom: 20px;
}
.stat {
    flex: 1 1 22%;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    text-align: center;
}
.stat h2 {
    margin: 0;
    color: #0b1f3a;
}
.stat p {
    margin: 5px 0 0 0;
    font-size: 14px;
    color: #555;
}
.card {
    background: white;
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}
.card p {
    margin: 5px 0;
}
.active {
    color: green;
    font-weight: bold;
}
.inactive {
    color: red;
    font-weight: bold;
}
button {
    background: #0b1f3a;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}
button:hover {
    background: #1e3d6b;
}
input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
}

/* LOGIN STYLES */
.login {
    width: 320px;
    margin: 100px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    text-align: center;
}
.login input {
    margin-bottom: 15px;
}

/* RESPONSIVE */
@media(max-width:800px){
    .stats {flex-direction: column;}
}
</style>
</head>
<body>

<header>
    <h1>Smart Traders</h1>
    <p>Invest by trading with us today</p>
</header>

<div class="container">

<!-- LOGIN FORM -->
<div id="login" class="login">
    <h3>Admin Login</h3>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

    <!-- STATS -->
    <div class="stats">
        <div class="stat">
            <h2>10,000+</h2>
            <p>Total Investors</p>
        </div>
        <div class="stat">
            <h2>10,000+</h2>
            <p>Active Investors</p>
        </div>
        <div class="stat">
            <h2 id="totalProfit">$0</h2>
            <p>Total Profit (USD)</p>
        </div>
        <div class="stat">
            <h2 id="totalWithdrawn">$0</h2>
            <p>Total Withdrawn (USD)</p>
        </div>
    </div>

    <!-- ADD CLIENT FORM -->
    <div class="card">
        <h3>Add Client</h3>
        <input id="name" placeholder="Client Name">
        <input id="country" placeholder="Country">
        <select id="plan">
            <option value="Basic">Basic Plan</option>
            <option value="Premium">Premium Plan</option>
        </select>
        <select id="status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
        </select>
        <input id="deposit" placeholder="Deposit (USD)">
        <input id="profit" placeholder="Profit (USD)">
        <input id="withdraw" placeholder="Withdrawn (USD)">
        <button onclick="addClient()">Add Client</button>
    </div>

    <!-- CLIENT LIST -->
    <h3>Client List</h3>
    <div id="clients"></div>

</div>

<script>
// LOGIN FUNCTION
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;
    if(u=="admin" && p=="1234"){
        document.getElementById("login").style.display="none";
        document.getElementById("dashboard").style.display="block";
    } else {
        alert("Wrong login");
    }
}

// CLIENT MANAGEMENT
let totalWithdrawn = 0;
let totalProfit = 0;

function addClient(){
    let name = document.getElementById("name").value;
    let country = document.getElementById("country").value;
    let plan = document.getElementById("plan").value;
    let status = document.getElementById("status").value;
    let deposit = parseFloat(document.getElementById("deposit").value) || 0;
    let profit = parseFloat(document.getElementById("profit").value) || 0;
    let withdrawn = parseFloat(document.getElementById("withdraw").value) || 0;

    let statusClass = status=="active" ? "active" : "inactive";

    let card = `
    <div class="card">
        <h3>${name}</h3>
        <p>Country: ${country}</p>
        <p>Plan: ${plan}</p>
        <p>Status: <span class="${statusClass}">${status}</span></p>
        <p>Deposit: $${deposit.toLocaleString()}</p>
        <p>Profit: $${profit.toLocaleString()}</p>
        <p>Withdrawn: $${withdrawn.toLocaleString()}</p>
    </div>
    `;
    document.getElementById("clients").innerHTML += card;

    // Update totals
    totalWithdrawn += withdrawn;
    totalProfit += profit;
    document.getElementById("totalWithdrawn").innerText = "$" + totalWithdrawn.toLocaleString();
    document.getElementById("totalProfit").innerText = "$" + totalProfit.toLocaleString();

    // Clear inputs
    document.getElementById("name").value = "";
    document.getElementById("country").value = "";
    document.getElementById("deposit").value = "";
    document.getElementById("profit").value = "";
    document.getElementById("withdraw").value = "";
}
</script>

</body>
  </html>
